    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f4f4; padding: 20px; color: #333; }
        
        /* تكبير حجم كلمة الشعار بشكل فخم وقوي */
        h1 { margin-bottom: 5px; color: #111; font-size: 3.8rem; font-weight: 900; letter-spacing: 1px; }

        /* حاوية أزرار التواصل وضبط المسافات */
        .contact-container { margin: 25px 0; display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; }
        
        /* تنسيق مشترك للأزرار */
        .btn { display: inline-block; padding: 12px 25px; color: white; text-decoration: none; border-radius: 50px; font-weight: bold; font-size: 1.1rem; box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: background 0.2s; }

        /* حجم وعرض الصور الكبيرة الواضحة */
        .row-top img, .row-bottom img { width: 340px; height: auto; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: transform 0.2s; }
        .row-top img:hover, .row-bottom img:hover { transform: scale(1.05); }
        
        /* التوافق الكامل مع شاشات الجوال وتصغير اسم الشعار قليلاً على الهواتف ليتناسب مع الشاشة */
        @media (max-width: 768px) {
            h1 { font-size: 2.8rem; }
            .row-top img, .row-bottom img { width: 90%; max-width: 360px; }
